name: CI Pipeline - Testes Automatizados

# 1. EXECUÇÃO POR PUSH
on:
  push:
    branches: [ main, develop ]
  
  # 2. EXECUÇÃO MANUAL
  workflow_dispatch:
    inputs:
      ambiente:
        description: 'Ambiente para execução'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - staging
          - production
  
  # 3. EXECUÇÃO AGENDADA (schedule)
  schedule:
    - cron: '0 6,18 * * *'

jobs:
  test:
    name: Executar Testes
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage
      
      - name: Executar testes com cobertura
        run: |
          pytest tests/ -v --cov=src --cov-report=html --cov-report=xml --html=reports/test-report.html --self-contained-html
      
      - name: Fazer upload dos relatórios
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-python-${{ matrix.python-version }}
          path: |
            reports/
            coverage-report/
            .coverage
          retention-days: 30
      
      - name: Publicar relatório no GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          destination_dir: test-reports
          publish_branch: gh-pages
          keep_files: true

  quality:
    name: Análise de Qualidade
    runs-on: ubuntu-latest
    needs: test
    if: success()
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Instalar dependências
        run: |
          pip install pylint flake8 black
      
      - name: Verificar estilo com flake8
        run: |
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Analisar com pylint
        run: |
          pylint src/ --fail-under=8.0 || echo "Pylint não passou em todos os critérios"

  notify:
    name: Notificar Resultado
    runs-on: ubuntu-latest
    needs: [test, quality]
    if: always()
    
    steps:
      - name: Status da Pipeline
        run: |
          if [ "${{ needs.test.result }}" == "success" ] && [ "${{ needs.quality.result }}" == "success" ]; then
            echo "✅ Pipeline executada com SUCESSO!"
          else
            echo "❌ Pipeline falhou!"
            exit 1
          fi
